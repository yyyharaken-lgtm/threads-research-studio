<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Threads Research Studio</title>
<meta name="description" content="伸びてるThreads投稿のキュレーションサイト">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 背景装飾 -->
<div class="mesh"></div>
<div class="grid-bg"></div>
<div class="grain"></div>

<div class="container">

  <!-- ナビゲーション -->
  <nav>
    <div class="logo" data-action="go-home">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd" aria-hidden="true">
          <path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.781 3.631 2.695 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.79-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.31-.883-2.367-.89h-.029c-.85 0-2.005.233-2.74 1.323l-1.692-1.143c.984-1.461 2.583-2.264 4.43-2.264h.04c3.085.018 4.923 1.912 5.107 5.225.105.044.21.09.31.138 1.405.66 2.434 1.66 2.978 2.892.757 1.715.827 4.512-1.45 6.78-1.738 1.733-3.85 2.49-6.84 2.51zm1.135-11.554c-.376 0-.741.012-1.094.03-1.789.1-2.926.916-2.873 1.78.058.871.93 1.323 2.213 1.234 1.18-.062 2.704-.508 2.961-3.473a10.0 10.0 0 0 0-1.207-.07z"/>
        </svg>
      </div>
      <span>Threads Research Studio</span>
    </div>
  </nav>

  <!-- ===== ビュー1：ホーム（ジャンル選択） ===== -->
  <section class="view view-home active" data-view="home">
    <div class="hero">
      <div class="eyebrow">✨ Curated by Claude in Chrome × Claude Code</div>
      <h1>
        <svg class="threads-icon-hero" viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd" aria-hidden="true">
          <path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.781 3.631 2.695 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.79-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.31-.883-2.367-.89h-.029c-.85 0-2.005.233-2.74 1.323l-1.692-1.143c.984-1.461 2.583-2.264 4.43-2.264h.04c3.085.018 4.923 1.912 5.107 5.225.105.044.21.09.31.138 1.405.66 2.434 1.66 2.978 2.892.757 1.715.827 4.512-1.45 6.78-1.738 1.733-3.85 2.49-6.84 2.51zm1.135-11.554c-.376 0-.741.012-1.094.03-1.789.1-2.926.916-2.873 1.78.058.871.93 1.323 2.213 1.234 1.18-.062 2.704-.508 2.961-3.473a10.0 10.0 0 0 0-1.207-.07z"/>
        </svg>
        バズ投稿<span class="accent">Library</span>
      </h1>
      <p>9ジャンル × バズった投稿　投稿のネタと切り口を見つける場所</p>
    </div>

    <!-- 統計 -->
    <div class="stats" id="stats">
      <div class="stat-item">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">投稿</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num" id="genreCount">0</div>
        <div class="stat-label">ジャンル</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-num" id="updatedAt">—</div>
        <div class="stat-label">最終更新</div>
      </div>
    </div>

    <!-- ジャンル選択 -->
    <h2 class="section-heading">ジャンルを選ぶ</h2>
    <div class="genre-grid" id="genreGrid">
      <!-- script.js が動的に挿入 -->
    </div>
  </section>

  <!-- ===== ビュー2：ジャンル詳細 ===== -->
  <section class="view view-genre-detail" data-view="genre-detail">
    <div class="view-head">
      <button class="btn-back" data-action="go-home">← 戻る</button>
      <div class="view-meta">
        <h2 id="genreDetailTitle">ジャンル名</h2>
        <p id="genreDetailMeta"></p>
      </div>
    </div>

    <div class="post-list" id="postList">
      <!-- script.js が動的に挿入 -->
    </div>
  </section>

  <!-- ===== ビュー3：エラー ===== -->
  <section class="view view-error" data-view="error">
    <div class="error-panel">
      <div class="error-icon">⚠️</div>
      <h2>エラーが発生しました</h2>
      <p id="errorMessage"></p>
      <div class="action-row">
        <button class="btn-secondary" data-action="go-home">ホームへ戻る</button>
      </div>
    </div>
  </section>

  <!-- トースト通知 -->
  <div id="toast" class="toast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
